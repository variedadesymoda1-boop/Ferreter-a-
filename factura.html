<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturación Profesional COP</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; margin: 0; padding: 10px; color: #333; }
        
        /* Menú y Botones (Se ocultan al imprimir/PDF) */
        .nav-menu { background: var(--primary); padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav-menu a { color: white; text-decoration: none; font-weight: bold; padding: 8px 15px; border-radius: 5px; background: rgba(255,255,255,0.1); font-size: 14px; }
        
        .container { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .header-factura { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Botones de Acción */
        .acciones-print { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-accion { flex: 1; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-pdf { background: #e67e22; }
        .btn-print { background: #34495e; }

        input, select { padding: 12px; border: 1px solid #999; border-radius: 6px; width: 100%; margin-bottom: 15px; font-size: 16px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-weight: 600; }

        .total-final { font-size: 2.2em; font-weight: bold; color: var(--primary); text-align: right; margin-top: 20px; border-top: 3px solid var(--primary); padding-top: 10px; }
        .btn-venta { background: var(--success); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2em; margin-top: 20px; }

        /* MAGIA: Ocultar todo lo que no es factura al Imprimir o Guardar PDF */
        @media print {
            .nav-menu, .no-print, .btn-venta, .acciones-print, .btn-borrar, .caja-busqueda { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; padding: 0; }
            input { border: none; padding: 0; font-weight: bold; font-size: 1.2em; }
        }
        
        .btn-borrar { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav-menu">
    <a href="index.html">📦 INVENTARIO</a>
    <a href="factura.html">📄 FACTURACIÓN</a>
</div>

<div class="container" id="app-body" style="display:none;">
    <div class="header-factura">
        <h2 style="margin:0; color:var(--primary);">📄 Factura de Venta</h2>
        <div id="fecha-ver" style="font-weight: bold; color: #666;"></div>
    </div>

    <div class="acciones-print">
        <button class="btn-accion btn-pdf" onclick="window.print()">📂 CREAR PDF</button>
        <button class="btn-accion btn-print" onclick="window.print()">🖨️ IMPRIMIR</button>
    </div>

    <div class="no-print">
        <label style="font-weight:bold; font-size:0.9em;">Nombre del Cliente:</label>
        <input type="text" id="cli" placeholder="Escribe el nombre aquí..." onkeyup="actualizarVista()">
        
        <div style="background:#eef2f7; padding:15px; border-radius:10px; margin-bottom:20px; border: 1px solid #d1d9e6;">
            <label style="font-weight:bold;">🔍 Buscar y Agregar Producto:</label>
            <select id="sel-prod" onchange="agregarAlCarrito()">
                <option value="">-- Selecciona un producto --</option>
            </select>
        </div>
    </div>

    <div id="datos-cliente-print">
        <p><b>Cliente:</b> <span id="nombre-cli-ver">Mostrador</span></p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Descripción</th>
                <th style="width: 70px;">Cant</th>
                <th>Venta Unit.</th>
                <th>Subtotal</th>
                <th class="no-print"></th>
            </tr>
        </thead>
        <tbody id="cuerpo-factura"></tbody>
    </table>

    <div class="total-final">TOTAL: <span id="total-html">$ 0</span></div>
    
    <button class="btn-venta no-print" onclick="registrarVentaEnNube()">✅ FINALIZAR VENTA Y DESCONTAR STOCK</button>
</div>

<script>
    // TUS LLAVES DE FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyBbsO9WwtptjDTCetZOauYVPCXCzJbZB30",
      authDomain: "ferreteria-distri-app-6d960.firebaseapp.com",
      projectId: "ferreteria-distri-app-6d960",
      storageBucket: "ferreteria-distri-app-6d960.firebasestorage.app",
      messagingSenderId: "507308726712",
      appId: "1:507308726712:web:5c557f79a59b7a561d574d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const formatoCOP = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 });

    let carrito = [];
    let productosCloud = [];

    // Seguridad y Carga inicial
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('app-body').style.display = 'block';
            cargarProductos();
        } else {
            window.location.href = "index.html";
        }
    });

    function cargarProductos() {
        db.collection("productos").onSnapshot((snap) => {
            const select = document.getElementById('sel-prod');
            select.innerHTML = '<option value="">-- Selecciona para agregar --</option>';
            productosCloud = [];
            snap.forEach((doc) => {
                const p = doc.data();
                productosCloud.push({ id: doc.id, ...p });
                if(p.cant > 0) {
                    select.innerHTML += `<option value="${doc.id}">${p.nombre} (Dispo: ${p.cant})</option>`;
                }
            });
        });
    }

    function agregarAlCarrito() {
        const id = document.getElementById('sel-prod').value;
        if(!id) return;
        const prod = productosCloud.find(x => x.id === id);
        const yaEsta = carrito.find(x => x.id === id);

        if(yaEsta) {
            if(yaEsta.cantidad < prod.cant) yaEsta.cantidad++;
            else alert("Sin stock suficiente");
        } else {
            carrito.push({ id: prod.id, nombre: prod.nombre, precio: prod.p_v, cantidad: 1, stockMax: prod.cant });
        }
        document.getElementById('sel-prod').value = "";
        dibujarTabla();
    }

    function dibujarTabla() {
        const cuerpo = document.getElementById('cuerpo-factura');
        cuerpo.innerHTML = "";
        let total = 0;
        
        carrito.forEach((item, index) => {
            const sub = item.precio * item.cantidad;
            total += sub;
            cuerpo.innerHTML += `
                <tr>
                    <td>${item.nombre}</td>
                    <td>${item.cantidad}</td>
                    <td>${formatoCOP.format(item.precio)}</td>
                    <td>${formatoCOP.format(sub)}</td>
                    <td class="no-print"><button class="btn-borrar" onclick="quitarItem(${index})">X</button></td>
                </tr>`;
        });
        document.getElementById('total-html').innerText = formatoCOP.format(total);
    }

    function quitarItem(index) {
        carrito.splice(index, 1);
        dibujarTabla();
    }

    function actualizarVista() {
        document.getElementById('nombre-cli-ver').innerText = document.getElementById('cli').value || "Mostrador";
    }

    async function registrarVentaEnNube() {
        if(carrito.length === 0) return alert("Agrega productos primero");
        
        try {
            // Guardar Venta
            await db.collection("ventas").add({
                cliente: document.getElementById('cli').value || "Mostrador",
                total: carrito.reduce((t, i) => t + (i.precio * i.cantidad), 0),
                fecha: new Date().toLocaleString('es-CO'),
                items: carrito
            });

            // Descontar Stock
            for (const item of carrito) {
                const ref = db.collection("productos").doc(item.id);
                const snap = await ref.get();
                await ref.update({ cant: snap.data().cant - item.cantidad });
            }

            alert("✅ Venta Guardada con éxito");
            location.reload();
        } catch (e) { alert("Error: " + e.message); }
    }

    // Fecha Automática
    document.getElementById('fecha-ver').innerText = new Date().toLocaleDateString('es-CO', { 
        year: 'numeric', month: 'long', day: 'numeric' 
    });
</script>
</body>
</html>
