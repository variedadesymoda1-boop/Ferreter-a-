<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factura - Ferretería</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #f39c12; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .nav-menu { background: var(--primary); padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .nav-menu a { color: white; text-decoration: none; font-weight: bold; margin: 0 15px; padding: 8px 15px; border-radius: 5px; background: rgba(255,255,255,0.1); }
        .nav-menu a:hover { background: var(--secondary); }
        
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .no-print { margin-bottom: 20px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #eee; padding: 10px; border: 1px solid #ddd; }
        td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        .total-box { background: var(--primary); color: white; padding: 20px; text-align: right; margin-top: 20px; border-radius: 8px; }
        .vueltos { background: #e8f4fd; padding: 15px; margin-top: 10px; border-radius: 8px; }
        
        @media print { .no-print, .nav-menu { display: none; } .container { box-shadow: none; border: none; } }
    </style>
</head>
<body>

<div class="nav-menu">
    <a href="index.html">📦 INVENTARIO</a>
    <a href="factura.html">📄 FACTURACIÓN</a>
</div>

<div class="container">
    <h1 style="text-align:center">📄 Factura de Venta</h1>
    
    <div class="no-print">
        <label><b>Nombre del Cliente:</b></label>
        <input type="text" id="cliente" placeholder="Nombre completo" style="margin-bottom:15px">
        
        <div style="display:grid; grid-template-columns: 2fr 1fr 1fr auto; gap:10px">
            <input type="text" id="p_nombre" placeholder="Producto" list="lista_prod">
            <datalist id="lista_prod"></datalist>
            <input type="number" id="p_cant" placeholder="Cant" value="1">
            <input type="number" id="p_venta" placeholder="Precio">
            <button onclick="agregar()" style="background:var(--success); color:white; border:none; padding:10px; border-radius:5px; cursor:pointer">+</button>
        </div>
    </div>

    <table>
        <thead><tr><th>Cant</th><th>Descripción</th><th>Unitario</th><th>Total</th><th class="no-print">X</th></tr></thead>
        <tbody id="cuerpo"></tbody>
    </table>

    <div class="total-box">
        <div style="font-size: 1.2em;">TOTAL A PAGAR:</div>
        <div id="gran-total" style="font-size: 2.2em; font-weight: bold;">$ 0</div>
    </div>

    <div class="vueltos no-print" style="display:flex; justify-content: space-between; align-items: center;">
        <div>Paga con: <input type="number" id="paga" onkeyup="vueltos()" style="width:120px"></div>
        <div style="text-align:right">Cambio: <b id="cambio" style="font-size:1.5em; color:var(--primary)">$ 0</b></div>
    </div>

    <button onclick="window.print()" style="width:100%; background:var(--primary); color:white; padding:15px; border:none; border-radius:8px; margin-top:15px; cursor:pointer" class="no-print">🖨️ IMPRIMIR FACTURA</button>
</div>

<script>
    let factura = [];
    const formatoCOP = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 });

    window.onload = () => {
        const inv = JSON.parse(localStorage.getItem('ferre_secure')) || [];
        const list = document.getElementById('lista_prod');
        inv.forEach(p => {
            let op = document.createElement('option');
            op.value = p.nombre;
            op.dataset.precio = p.p_v;
            list.appendChild(op);
        });
    };

    document.getElementById('p_nombre').addEventListener('input', (e) => {
        const op = Array.from(document.getElementById('lista_prod').options).find(o => o.value === e.target.value);
        if(op) document.getElementById('p_venta').value = op.dataset.precio;
    });

    function agregar() {
        const n = document.getElementById('p_nombre').value;
        const c = parseInt(document.getElementById('p_cant').value);
        const v = parseFloat(document.getElementById('p_venta').value);
        if(n && c > 0) {
            factura.push({n, c, v});
            dibujar();
            document.getElementById('p_nombre').value = '';
            document.getElementById('p_venta').value = '';
        }
    }

    function dibujar() {
        const t = document.getElementById('cuerpo');
        t.innerHTML = ''; let suma = 0;
        factura.forEach((p, i) => {
            suma += (p.c * p.v);
            t.innerHTML += `<tr><td>${p.c}</td><td>${p.n}</td><td>${formatoCOP.format(p.v)}</td><td>${formatoCOP.format(p.c*p.v)}</td><td class="no-print"><button onclick="borrar(${i})" style="background:red; color:white; border:none; border-radius:3px">X</button></td></tr>`;
        });
        document.getElementById('gran-total').innerText = formatoCOP.format(suma);
        window.total = suma;
        vueltos();
    }

    function borrar(i) { factura.splice(i, 1); dibujar(); }

    function vueltos() {
        const p = parseFloat(document.getElementById('paga').value) || 0;
        const v = p - window.total;
        document.getElementById('cambio').innerText = v >= 0 ? formatoCOP.format(v) : "Falta dinero";
    }
</script>
</body>
</html>
