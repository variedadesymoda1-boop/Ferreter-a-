<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factura Protegida - Ferretería</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #f39c12; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        #bloqueo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #contenido-sistema { display: none; padding: 20px; }
        .nav-menu { background: var(--primary); padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .nav-menu a { color: white; text-decoration: none; font-weight: bold; margin: 0 15px; padding: 8px 15px; border-radius: 5px; background: rgba(255,255,255,0.1); }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .grid-cliente { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; }
        @media print { .no-print, .nav-menu { display: none; } }
    </style>
</head>
<body>

<div id="bloqueo">
    <div style="background:white; padding:30px; border-radius:12px; color:#333; text-align:center;">
        <h2>🔒 Seguridad Facturación</h2>
        <input type="password" id="clave-input" placeholder="Ingresa la clave">
        <br><br>
        <button onclick="validarClave()" style="background:var(--success); color:white; border:none; padding:10px; width:100%; border-radius:5px; font-weight:bold;">Entrar</button>
    </div>
</div>

<div id="contenido-sistema">
    <div class="nav-menu">
        <a href="index.html">📦 INVENTARIO</a>
        <a href="factura.html">📄 FACTURACIÓN</a>
    </div>

    <div class="container">
        <h1 style="text-align:center">📄 Factura de Venta</h1>
        <div class="no-print">
            <div class="grid-cliente">
                <input type="text" id="cliente" placeholder="Nombre del Cliente">
                <input type="text" id="celular" placeholder="Celular">
                <input type="text" id="direccion" placeholder="Dirección">
                <select id="estado"><option value="Entregado">Entregado ✅</option><option value="Pendiente">Pendiente ⏳</option></select>
            </div>
            <div style="display:grid; grid-template-columns: 2fr 1fr 1fr auto; gap:10px">
                <input type="text" id="p_nombre" placeholder="Producto" list="lista_prod">
                <datalist id="lista_prod"></datalist>
                <input type="number" id="p_cant" placeholder="Cant" value="1">
                <input type="number" id="p_venta" placeholder="Precio">
                <button onclick="agregar()" style="background:var(--success); color:white; border:none; padding:10px; border-radius:5px;">+</button>
            </div>
        </div>
        <table style="width:100%; border-collapse: collapse; margin-top:20px;">
            <thead><tr style="background:#eee"><th>Cant</th><th>Descripción</th><th>Total</th></tr></thead>
            <tbody id="cuerpo"></tbody>
        </table>
        <div style="background:var(--primary); color:white; padding:20px; text-align:right; margin-top:20px; border-radius:8px;">
            <div id="gran-total" style="font-size: 2em; font-weight: bold;">$ 0</div>
        </div>
        <button onclick="guardarYImprimir()" style="width:100%; background:var(--primary); color:white; padding:15px; border:none; border-radius:8px; margin-top:15px;" class="no-print">🖨️ IMPRIMIR FACTURA</button>
    </div>
</div>

<script>
    const CLAVE_MAESTRA = "ferreteria/distri$34";
    function validarClave() {
        if(document.getElementById('clave-input').value === CLAVE_MAESTRA) {
            document.getElementById('bloqueo').style.display = 'none';
            document.getElementById('contenido-sistema').style.display = 'block';
        } else { alert("Clave incorrecta"); }
    }

    let factura = [];
    const formatoCOP = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 });

    window.onload = () => {
        const inv = JSON.parse(localStorage.getItem('ferre_secure')) || [];
        const list = document.getElementById('lista_prod');
        inv.forEach(p => {
            let op = document.createElement('option');
            op.value = p.nombre; op.dataset.precio = p.p_v;
            list.appendChild(op);
        });
    };

    document.getElementById('p_nombre').addEventListener('input', (e) => {
        const op = Array.from(document.getElementById('lista_prod').options).find(o => o.value === e.target.value);
        if(op) document.getElementById('p_venta').value = op.dataset.precio;
    });

    function agregar() {
        const n = document.getElementById('p_nombre').value;
        const c = parseInt(document.getElementById('p_cant').value);
        const v = parseFloat(document.getElementById('p_venta').value);
        if(n && c > 0) { factura.push({n, c, v}); dibujar(); }
    }

    function dibujar() {
        const t = document.getElementById('cuerpo');
        t.innerHTML = ''; let suma = 0;
        factura.forEach(p => {
            suma += (p.c * p.v);
            t.innerHTML += `<tr><td>${p.c}</td><td>${p.n}</td><td>${formatoCOP.format(p.c*p.v)}</td></tr>`;
        });
        document.getElementById('gran-total').innerText = formatoCOP.format(suma);
        window.total = suma;
    }

    function guardarYImprimir() {
        const venta = {
            cliente: document.getElementById('cliente').value,
            celular: document.getElementById('celular').value,
            direccion: document.getElementById('direccion').value,
            estado: document.getElementById('estado').value,
            total: window.total,
            fecha: new Date().toLocaleDateString()
        };
        let ventas = JSON.parse(localStorage.getItem('ferre_ventas')) || [];
        ventas.push(venta);
        localStorage.setItem('ferre_ventas', JSON.stringify(ventas));
        window.print();
    }
</script>
</body>
</html>
