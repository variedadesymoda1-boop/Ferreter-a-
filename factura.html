<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturación Cloud - Ferretería</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --accent: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; margin: 0; padding: 10px; color: #333; }
        
        /* Menú superior */
        .nav-menu { background: var(--primary); padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav-menu a { color: white; text-decoration: none; font-weight: bold; padding: 8px 15px; border-radius: 5px; background: rgba(255,255,255,0.1); font-size: 14px; }
        
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-factura { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }

        /* Formulario cliente */
        .form-cliente { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        @media (min-width: 600px) { .form-cliente { grid-template-columns: 1fr 1fr; } }
        label { display: block; font-weight: bold; font-size: 0.9em; margin-bottom: 5px; color: var(--primary); }
        input, select { padding: 12px; border: 1px solid #999; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 16px; }

        /* Buscador de productos */
        .caja-busqueda { background: #eef2f7; padding: 15px; border-radius: 10px; border: 1px solid #d1d9e6; margin-bottom: 20px; }

        /* Tabla adaptable */
        .tabla-scroll { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-weight: 500; }

        .total-box { text-align: right; margin-top: 25px; padding: 15px; border-top: 3px solid var(--primary); }
        .total-box span { font-size: 2em; font-weight: bold; color: var(--primary); display: block; }

        .btn-venta { background: var(--success); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1.2em; transition: 0.3s; }
        .btn-venta:active { transform: scale(0.97); }
        .btn-borrar { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav-menu">
    <a href="index.html">📦 INVENTARIO</a>
    <a href="factura.html">📄 FACTURACIÓN</a>
</div>

<div class="container" id="app-body" style="display:none;">
    <div class="header-factura">
        <h2 style="margin:0; color:var(--primary);">📄 Nueva Venta Cloud</h2>
        <small id="fecha-actual" style="color:#666;"></small>
    </div>

    <div class="form-cliente">
        <div>
            <label>Cliente</label>
            <input type="text" id="cliente-n" placeholder="Nombre">
        </div>
        <div>
            <label>Cédula / NIT</label>
            <input type="text" id="cliente-id" placeholder="Opcional">
        </div>
    </div>

    <div class="caja-busqueda">
        <label>🔍 Buscar Producto en Inventario:</label>
        <select id="sel-prod" onchange="agregar()">
            <option value="">-- Cargando productos... --</option>
        </select>
    </div>

    <div class="tabla-scroll">
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th style="width: 80px;">Cant</th>
                    <th>Subtotal</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="cuerpo"></tbody>
        </table>
    </div>

    <div class="total-box">
        <label>TOTAL A PAGAR:</label>
        <span id="total-html">$ 0</span>
    </div>

    <button class="btn-venta" onclick="finalizar()">✅ REGISTRAR VENTA Y DESCONTAR STOCK</button>
</div>

<script>
    // TUS LLAVES DE FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyBbsO9WwtptjDTCetZOauYVPCXCzJbZB30",
      authDomain: "ferreteria-distri-app-6d960.firebaseapp.com",
      projectId: "ferreteria-distri-app-6d960",
      storageBucket: "ferreteria-distri-app-6d960.firebasestorage.app",
      messagingSenderId: "507308726712",
      appId: "1:507308726712:web:5c557f79a59b7a561d574d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const formato = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 });

    let carrito = [];
    let prodsDB = [];

    // --- SEGURIDAD: VERIFICAR QUE ESTÉ LOGUEADO ---
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('app-body').style.display = 'block';
            cargarProds();
        } else {
            // Si no hay sesión, lo manda al login de index.html
            window.location.href = "index.html";
        }
    });

    function cargarProds() {
        db.collection("productos").onSnapshot((snap) => {
            const sel = document.getElementById('sel-prod');
            sel.innerHTML = '<option value="">-- Seleccionar --</option>';
            prodsDB = [];
            snap.forEach((doc) => {
                const p = doc.data();
                prodsDB.push({ id: doc.id, ...p });
                if(p.cant > 0) {
                    sel.innerHTML += `<option value="${doc.id}">${p.nombre} (Dispo: ${p.cant})</option>`;
                }
            });
        });
    }

    function agregar() {
        const id = document.getElementById('sel-prod').value;
        if(!id) return;
        const p = prodsDB.find(x => x.id === id);
        const ya = carrito.find(x => x.id === id);

        if(ya) {
            if(ya.cantidad < p.cant) ya.cantidad++;
            else alert("No hay más stock");
        } else {
            carrito.push({ id: p.id, nombre: p.nombre, precio: p.p_v, cantidad: 1, stockMax: p.cant });
        }
        document.getElementById('sel-prod').value = "";
        dibujar();
    }

    function dibujar() {
        const cuerpo = document.getElementById('cuerpo');
        cuerpo.innerHTML = "";
        let total = 0;
        carrito.forEach((item, i) => {
            const sub = item.precio * item.cantidad;
            total += sub;
            cuerpo.innerHTML += `
                <tr>
                    <td><b>${item.nombre}</b><br><small>${formato.format(item.precio)}</small></td>
                    <td><input type="number" value="${item.cantidad}" onchange="editCant(${i}, this.value)" min="1" style="width:50px"></td>
                    <td><b>${formato.format(sub)}</b></td>
                    <td><button class="btn-borrar" onclick="borrarItem(${i})">X</button></td>
                </tr>`;
        });
        document.getElementById('total-html').innerText = formato.format(total);
    }

    function editCant(i, v) {
        const n = parseInt(v);
        if(n > carrito[i].stockMax) {
            alert("Solo hay " + carrito[i].stockMax + " disponibles");
            carrito[i].cantidad = carrito[i].stockMax;
        } else {
            carrito[i].cantidad = n > 0 ? n : 1;
        }
        dibujar();
    }

    function borrarItem(i) {
        carrito.splice(i, 1);
        dibujar();
    }

    async function finalizar() {
        if(carrito.length === 0) return alert("Agrega productos");
        
        const venta = {
            cliente: document.getElementById('cliente-n').value || "Mostrador",
            id: document.getElementById('cliente-id').value || "N/A",
            items: carrito,
            total: carrito.reduce((t, i) => t + (i.precio * i.cantidad), 0),
            fecha: new Date().getTime(),
            fechaTxt: new Date().toLocaleString()
        };

        try {
            // Guardar venta
            await db.collection("ventas").add(venta);
            
            // Actualizar stock en tiempo real
            for (const item of carrito) {
                const ref = db.collection("productos").doc(item.id);
                const actual = await ref.get();
                await ref.update({ cant: actual.data().cant - item.cantidad });
            }

            alert("✅ Venta registrada y stock actualizado");
            location.reload();
        } catch (e) { alert("Error: " + e.message); }
    }

    document.getElementById('fecha-actual').innerText = new Date().toLocaleDateString();
</script>
</body>
</html>
