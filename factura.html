<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturación Profesional COP</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; margin: 0; padding: 10px; }
        .nav-menu { background: var(--primary); padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; }
        .nav-menu a { color: white; text-decoration: none; font-weight: bold; padding: 10px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .no-print { display: block; }
        
        /* Estilos para Impresión */
        @media print {
            .no-print, .nav-menu, .btn-borrar, .caja-busqueda, .btn-venta { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            table { border: 1px solid #000; }
        }

        input, select { padding: 10px; border: 1px solid #999; border-radius: 6px; width: 100%; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; font-weight: 600; }
        .total-final { font-size: 2em; font-weight: bold; color: var(--primary); text-align: right; }
        .btn-venta { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2em; }
        .btn-print { background: #34495e; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="nav-menu no-print">
    <a href="index.html">📦 INVENTARIO</a>
    <a href="factura.html">📄 FACTURACIÓN</a>
</div>

<div class="container" id="area-factura">
    <div style="text-align:center;">
        <h2 style="margin:0;">FERRETERÍA DISTRI</h2>
        <p>Girardot, Cundinamarca</p>
        <button class="btn-print no-print" onclick="window.print()">🖨️ IMPRIMIR / GUARDAR PDF</button>
    </div>

    <div class="no-print">
        <input type="text" id="cli" placeholder="Nombre del Cliente">
        <div style="background:#eef2f7; padding:15px; border-radius:10px; margin-bottom:10px;">
            <label>🔍 Buscar Producto:</label>
            <select id="sel-prod" onchange="agregar()"></select>
        </div>
    </div>

    <div id="datos-cliente-print" style="margin-bottom:10px;">
        <p><b>Cliente:</b> <span id="nombre-cli-ver">Mostrador</span></p>
        <p><b>Fecha:</b> <span id="fecha-ver"></span></p>
    </div>

    <table>
        <thead><tr><th>Descripción</th><th>Cant</th><th>Precio</th><th>Subtotal</th><th class="no-print"></th></tr></thead>
        <tbody id="cuerpo"></tbody>
    </table>

    <div class="total-final">TOTAL: <span id="total-html">$ 0</span></div>
    
    <button class="btn-venta no-print" onclick="finalizar()">✅ REGISTRAR VENTA</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBbsO9WwtptjDTCetZOauYVPCXCzJbZB30",
      authDomain: "ferreteria-distri-app-6d960.firebaseapp.com",
      projectId: "ferreteria-distri-app-6d960",
      storageBucket: "ferreteria-distri-app-6d960.firebasestorage.app",
      messagingSenderId: "507308726712",
      appId: "1:507308726712:web:5c557f79a59b7a561d574d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const formato = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 });

    let carrito = []; let prods = [];
    document.getElementById('fecha-ver').innerText = new Date().toLocaleDateString();

    db.collection("productos").onSnapshot(snap => {
        const sel = document.getElementById('sel-prod');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        prods = [];
        snap.forEach(doc => {
            const p = doc.data(); prods.push({id: doc.id, ...p});
            if(p.cant > 0) sel.innerHTML += `<option value="${doc.id}">${p.nombre}</option>`;
        });
    });

    function agregar() {
        const id = document.getElementById('sel-prod').value;
        const p = prods.find(x => x.id === id);
        carrito.push({ ...p, cantidad: 1 });
        dibujar();
    }

    function dibujar() {
        const c = document.getElementById('cuerpo'); c.innerHTML = "";
        let t = 0;
        document.getElementById('nombre-cli-ver').innerText = document.getElementById('cli').value || "Mostrador";
        carrito.forEach((item, i) => {
            const sub = item.p_v * item.cantidad; t += sub;
            c.innerHTML += `<tr><td>${item.nombre}</td><td>${item.cantidad}</td><td>${formato.format(item.p_v)}</td><td>${formato.format(sub)}</td><td class="no-print"><button onclick="carrito.splice(${i},1); dibujar();">X</button></td></tr>`;
        });
        document.getElementById('total-html').innerText = formato.format(t);
    }

    async function finalizar() {
        if(carrito.length === 0) return alert("Factura vacía");
        try {
            for(const item of carrito) {
                const ref = db.collection("productos").doc(item.id);
                const actual = await ref.get();
                await ref.update({ cant: actual.data().cant - 1 });
            }
            alert("Venta registrada");
            location.reload();
        } catch(e) { alert("Error"); }
    }
</script>
</body>
</html>
