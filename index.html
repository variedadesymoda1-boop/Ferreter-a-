<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Cloud - Ferretería</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #f39c12; --success: #27ae60; --danger: #e74c3c; --edit: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; margin: 0; padding: 10px; }
        
        #bloqueo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-card { background: white; padding: 25px; border-radius: 12px; text-align: center; width: 90%; max-width: 350px; }

        #contenido-sistema { display: none; }
        .nav-menu { background: var(--primary); padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav-menu a { color: white; text-decoration: none; font-weight: bold; padding: 10px 15px; border-radius: 5px; background: rgba(255,255,255,0.1); }
        
        .container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .form-inv { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; }
        .form-inv div { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; color: #333; margin-bottom: 3px; }
        input { padding: 10px; border: 1px solid #999; border-radius: 5px; font-size: 14px; color: black; }

        .tabla-scroll { overflow-x: auto; width: 100%; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: var(--primary); color: white; padding: 12px; font-size: 12px; border: 1px solid #1a252f; }
        td { padding: 10px; border: 1px solid #ddd; text-align: center; font-size: 14px; color: #000; font-weight: 500; }
        
        .col-compra-header { background-color: #fbdbc3 !important; color: #5d4037 !important; font-weight: 900; }
        .col-venta-header { background-color: #c8e6c9 !important; color: #1b5e20 !important; font-weight: 900; }

        .btn-accion { border: none; color: white; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 2px; }
        .total-resumen { margin-top: 15px; padding: 15px; background: var(--primary); color: white; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; text-align: center; font-weight: bold; }

        @media (min-width: 600px) {
            .total-resumen { flex-direction: row; justify-content: space-around; font-size: 1.2em; }
            body { padding: 20px; }
        }
    </style>
</head>
<body>

<div id="bloqueo">
    <div class="login-card">
        <h2>🔒 Seguridad 🇨🇴</h2>
        <input type="password" id="clave-input" placeholder="Contraseña Ferretería">
        <button onclick="validarClave()" style="background:var(--success); color:white; border:none; padding:12px; margin-top:10px; width:100%; border-radius:5px; font-weight:bold; cursor:pointer;">INGRESAR</button>
    </div>
</div>

<div id="contenido-sistema">
    <div class="nav-menu">
        <a href="index.html">📦 INVENTARIO</a>
        <a href="factura.html">📄 FACTURACIÓN</a>
    </div>

    <div class="container">
        <h2 id="titulo-form" style="margin-top:0">📊 Control de Inventario CLOUD</h2>
        <input type="hidden" id="edit-id">

        <div class="form-inv">
            <div><label>Producto</label><input type="text" id="n"></div>
            <div><label>Cantidad</label><input type="number" id="c" oninput="calcularUnitario()"></div>
            <div><label>Compra Total ($)</label><input type="number" id="pc_total" oninput="calcularUnitario()"></div>
            <div><label>Costo Unitario</label><input type="text" id="pc_un" readonly style="background:#eee"></div>
            <div><label>Venta Unidad</label><input type="number" id="pv"></div>
            <button id="btn-guardar" onclick="guardarFirebase()" style="background:var(--success); color:white; height:45px; border:none; border-radius:5px; font-weight:bold; cursor:pointer">+ GUARDAR</button>
        </div>

        <input type="text" id="bus" style="width:100%; padding:12px; margin-bottom:15px; border-radius:5px; border:2px solid #ccc; box-sizing:border-box" placeholder="🔍 Buscar en la nube..." onkeyup="dibujar()">

        <div class="tabla-scroll">
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Stock</th>
                        <th class="col-compra-header">Compra Total</th>
                        <th class="col-compra-header">Costo Unit.</th>
                        <th class="col-venta-header">Venta Unit.</th>
                        <th>Ganancia</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="lista"></tbody>
            </table>
        </div>

        <div class="total-resumen">
            <div>Inversión: <span id="res-inv">$ 0</span></div>
            <div>Ganancia Estimada: <span id="res-util">$ 0</span></div>
        </div>
    </div>
</div>

<script>
    // TU NUEVA CONFIGURACIÓN DE FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyBbsO9WwtptjDTCetZOauYVPCXCzJbZB30",
      authDomain: "ferreteria-distri-app-6d960.firebaseapp.com",
      projectId: "ferreteria-distri-app-6d960",
      storageBucket: "ferreteria-distri-app-6d960.firebasestorage.app",
      messagingSenderId: "507308726712",
      appId: "1:507308726712:web:5c557f79a59b7a561d574d"
    };

    // Inicializar Firebase Compat
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const CLAVE = "ferreteria/distri$34";
    const formato = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 });

    function validarClave() {
        if(document.getElementById('clave-input').value === CLAVE) {
            document.getElementById('bloqueo').style.display = 'none';
            document.getElementById('contenido-sistema').style.display = 'block';
            escucharDatos();
        } else { alert("Clave Incorrecta"); }
    }

    function calcularUnitario() {
        const total = parseFloat(document.getElementById('pc_total').value) || 0;
        const cant = parseFloat(document.getElementById('c').value) || 0;
        document.getElementById('pc_un').value = cant > 0 ? formato.format(Math.round(total / cant)) : "$ 0";
    }

    async function guardarFirebase() {
        const idEd = document.getElementById('edit-id').value;
        const nombre = document.getElementById('n').value.toUpperCase();
        const cant = parseInt(document.getElementById('c').value);
        const p_total = parseFloat(document.getElementById('pc_total').value);
        const p_venta = parseFloat(document.getElementById('pv').value);

        if(!nombre || isNaN(cant)) return alert("Completa los datos");

        const datos = {
            nombre, cant, p_total,
            p_un: Math.round(p_total/cant),
            p_v: p_venta,
            fecha: new Date().getTime()
        };

        try {
            if(idEd) {
                await db.collection("productos").doc(idEd).update(datos);
                document.getElementById('edit-id').value = "";
                document.getElementById('btn-guardar').innerText = "+ GUARDAR";
                document.getElementById('btn-guardar').style.background = "var(--success)";
            } else {
                await db.collection("productos").add(datos);
            }
            limpiarForm();
        } catch (error) {
            alert("Error al guardar: " + error.message);
        }
    }

    function escucharDatos() {
        db.collection("productos").orderBy("fecha", "desc").onSnapshot((snapshot) => {
            const lista = document.getElementById('lista');
            const bus = document.getElementById('bus').value.toLowerCase();
            lista.innerHTML = '';
            let ti = 0; let tu = 0;

            snapshot.forEach((doc) => {
                const p = doc.data();
                const id = doc.id;
                if(p.nombre.toLowerCase().includes(bus)) {
                    const g = p.p_v - p.p_un;
                    ti += (p.p_un * p.cant);
                    tu += (g * p.cant);

                    lista.innerHTML += `
                        <tr>
                            <td style="text-align:left"><b>${p.nombre}</b></td>
                            <td><b>${p.cant}</b></td>
                            <td style="background:#fff4ed">${formato.format(p.p_total)}</td>
                            <td style="background:#fff4ed"><b>${formato.format(p.p_un)}</b></td>
                            <td style="background:#f1f8e9"><b>${formato.format(p.p_v)}</b></td>
                            <td style="color:green; font-weight:bold">${formato.format(g)}</td>
                            <td>
                                <button class="btn-accion" style="background:var(--edit)" onclick="editar('${id}', '${p.nombre}', ${p.cant}, ${p.p_total}, ${p.p_v})">✏️</button>
                                <button class="btn-accion" style="background:var(--danger)" onclick="borrar('${id}')">🗑️</button>
                            </td>
                        </tr>`;
                }
            });
            document.getElementById('res-inv').innerText = formato.format(ti);
            document.getElementById('res-util').innerText = formato.format(tu);
        });
    }

    function editar(id, n, c, pt, pv) {
        document.getElementById('edit-id').value = id;
        document.getElementById('n').value = n;
        document.getElementById('c').value = c;
        document.getElementById('pc_total').value = pt;
        document.getElementById('pv').value = pv;
        document.getElementById('btn-guardar').innerText = "💾 ACTUALIZAR";
        document.getElementById('btn-guardar').style.background = "var(--edit)";
        calcularUnitario();
        window.scrollTo(0,0);
    }

    async function borrar(id) {
        if(confirm("¿Eliminar de la nube?")) {
            await db.collection("productos").doc(id).delete();
        }
    }

    function dibujar() { escucharDatos(); }

    function limpiarForm() {
        document.querySelectorAll('.form-inv input').forEach(i => i.value = '');
    }
</script>
</body>
</html>
