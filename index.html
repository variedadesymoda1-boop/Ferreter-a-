<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Cloud - Ferretería</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #f39c12; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; margin: 0; padding: 10px; }
        #contenido-sistema { display: block; padding: 20px; } /* Desactivé el bloqueo temporal para pruebas */
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-inv { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ddd; }
        input { padding: 10px; border: 1px solid #999; border-radius: 5px; }
        .tabla-scroll { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--primary); color: white; padding: 10px; }
        td { padding: 10px; border: 1px solid #eee; text-align: center; color: black; }
        .btn-accion { border: none; padding: 8px; border-radius: 4px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="contenido-sistema">
    <div class="container">
        <h2>☁️ Inventario Sincronizado (Firebase)</h2>
        <div class="form-inv">
            <input type="text" id="n" placeholder="Producto">
            <input type="number" id="c" placeholder="Cant.">
            <input type="number" id="pc_total" placeholder="Compra Total">
            <input type="number" id="pv" placeholder="Venta Unit.">
            <button onclick="guardarFirebase()" style="background:var(--success); color:white; font-weight:bold; cursor:pointer; border:none; border-radius:5px;">GUARDAR EN NUBE</button>
        </div>

        <div class="tabla-scroll">
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Stock</th>
                        <th>Costo Unit.</th>
                        <th>Venta Unit.</th>
                        <th>Ganancia</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="lista"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Configuración de Firebase (PEGA AQUÍ TU PROPIO CÓDIGO)
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_PROYECTO.firebaseapp.com",
        projectId: "TU_PROYECTO_ID",
        storageBucket: "TU_PROYECTO.appspot.com",
        messagingSenderId: "TU_ID",
        appId: "TU_APP_ID"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const formato = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 });

    // FUNCIÓN PARA GUARDAR
    async function guardarFirebase() {
        const nombre = document.getElementById('n').value.toUpperCase();
        const cant = parseInt(document.getElementById('c').value);
        const p_total = parseFloat(document.getElementById('pc_total').value);
        const p_venta = parseFloat(document.getElementById('pv').value);

        if (nombre && cant) {
            await db.collection("productos").add({
                nombre, cant, p_total,
                p_un: Math.round(p_total / cant),
                p_v: p_venta,
                fecha: new Date().getTime()
            });
            alert("Sincronizado con éxito");
            document.querySelectorAll('input').forEach(i => i.value = '');
        }
    }

    // FUNCIÓN PARA LEER EN TIEMPO REAL
    db.collection("productos").orderBy("fecha", "desc").onSnapshot((querySnapshot) => {
        const lista = document.getElementById('lista');
        lista.innerHTML = "";
        querySnapshot.forEach((doc) => {
            const p = doc.data();
            const g = p.p_v - p.p_un;
            lista.innerHTML += `
                <tr>
                    <td style="text-align:left"><b>${p.nombre}</b></td>
                    <td>${p.cant}</td>
                    <td>${formato.format(p.p_un)}</td>
                    <td><b>${formato.format(p.p_v)}</b></td>
                    <td style="color:green; font-weight:bold">${formato.format(g)}</td>
                    <td><button onclick="borrarFirebase('${doc.id}')" style="background:red" class="btn-accion">🗑️</button></td>
                </tr>`;
        });
    });

    async function borrarFirebase(id) {
        if(confirm("¿Eliminar de la nube?")) {
            await db.collection("productos").doc(id).delete();
        }
    }
</script>
</body>
</html>
