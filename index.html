<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Cloud - Acceso Privado</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --edit: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; margin: 0; padding: 0; color: #333; }
        
        /* LOGIN ADAPTABLE */
        #bloqueo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-card { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .login-card h2 { margin-bottom: 20px; color: var(--primary); }
        .login-card input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-size: 16px; }
        .btn-entrar { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* SISTEMA */
        #contenido-sistema { display: none; padding: 10px; }
        .nav-menu { background: var(--primary); padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav-menu a, .btn-salir { color: white; text-decoration: none; font-weight: bold; padding: 10px 15px; border-radius: 5px; background: rgba(255,255,255,0.1); font-size: 14px; border: none; cursor: pointer; }
        .btn-salir { background: var(--danger); }

        .container { max-width: 1100px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* FORMULARIO ADAPTABLE */
        .form-inv { display: grid; grid-template-columns: 1fr; gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd; }
        @media (min-width: 600px) { .form-inv { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); } }
        .form-inv input { padding: 12px; border: 1px solid #999; border-radius: 6px; font-size: 15px; }

        /* TABLA ADAPTABLE */
        .tabla-scroll { overflow-x: auto; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #eee; padding: 12px; font-size: 13px; text-align: center; }
        td { padding: 12px; border: 1px solid #eee; text-align: center; font-size: 15px; font-weight: 500; color: #000; }
        
        .btn-accion { padding: 8px; border: none; border-radius: 5px; color: white; cursor: pointer; margin: 2px; }
    </style>
</head>
<body>

<div id="bloqueo">
    <div class="login-card">
        <h2>🇨🇴 Ferretería Cloud</h2>
        <input type="email" id="email-login" placeholder="Correo electrónico">
        <input type="password" id="pass-login" placeholder="Contraseña">
        <button class="btn-entrar" onclick="iniciarSesion()">ENTRAR</button>
    </div>
</div>

<div id="contenido-sistema">
    <div class="nav-menu">
        <a href="index.html">📦 INVENTARIO</a>
        <a href="factura.html">📄 FACTURACIÓN</a>
        <button class="btn-salir" onclick="cerrarSesion()">CERRAR SESIÓN</button>
    </div>

    <div class="container">
        <h3>📦 Control de Inventario</h3>
        <div class="form-inv">
            <input type="text" id="n" placeholder="Nombre Producto">
            <input type="number" id="c" placeholder="Cantidad">
            <input type="number" id="pt" placeholder="Costo Total ($)">
            <input type="number" id="pv" placeholder="Venta Unidad ($)">
            <button onclick="guardarFirebase()" style="background:var(--success); color:white; font-weight:bold; border:none; border-radius:6px; cursor:pointer;">+ GUARDAR</button>
        </div>

        <div class="tabla-scroll">
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Stock</th>
                        <th>Costo Unit.</th>
                        <th>Venta Unit.</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="lista"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBbsO9WwtptjDTCetZOauYVPCXCzJbZB30",
      authDomain: "ferreteria-distri-app-6d960.firebaseapp.com",
      projectId: "ferreteria-distri-app-6d960",
      storageBucket: "ferreteria-distri-app-6d960.firebasestorage.app",
      messagingSenderId: "507308726712",
      appId: "1:507308726712:web:5c557f79a59b7a561d574d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const formato = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 });

    // Monitor de Sesión
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('bloqueo').style.display = 'none';
            document.getElementById('contenido-sistema').style.display = 'block';
            cargarDatos();
        } else {
            document.getElementById('bloqueo').style.display = 'flex';
            document.getElementById('contenido-sistema').style.display = 'none';
        }
    });

    async function iniciarSesion() {
        const email = document.getElementById('email-login').value;
        const pass = document.getElementById('pass-login').value;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch (error) { alert("Usuario o clave incorrecta"); }
    }

    function cerrarSesion() { auth.signOut(); }

    async function guardarFirebase() {
        const n = document.getElementById('n').value.toUpperCase();
        const c = parseInt(document.getElementById('c').value);
        const pt = parseFloat(document.getElementById('pt').value);
        const pv = parseFloat(document.getElementById('pv').value);

        if(n && c) {
            await db.collection("productos").add({
                nombre: n, cant: c, p_total: pt, p_un: Math.round(pt/c), p_v: pv, fecha: new Date().getTime()
            });
            document.querySelectorAll('input').forEach(i => i.value = "");
        }
    }

    function cargarDatos() {
        db.collection("productos").orderBy("fecha", "desc").onSnapshot((snapshot) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                lista.innerHTML += `<tr>
                    <td style="text-align:left"><b>${p.nombre}</b></td>
                    <td>${p.cant}</td>
                    <td>${formato.format(p.p_un)}</td>
                    <td style="color:green"><b>${formato.format(p.p_v)}</b></td>
                    <td><button class="btn-accion" style="background:var(--danger)" onclick="borrar('${doc.id}')">🗑️</button></td>
                </tr>`;
            });
        });
    }

    async function borrar(id) { if(confirm("¿Eliminar?")) await db.collection("productos").doc(id).delete(); }
</script>
</body>
</html>
